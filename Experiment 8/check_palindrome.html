<!DOCTYPE html>
<html>

<head>
    <title>Palindrome Number Check</title>
</head>

<body>

    <h3>Check Palindrome Number</h3>
    <input type="number" id="pal">
    <button onclick="checkPalindrome()">Check</button>
    <p id="result"></p>

    <script>
        function checkPalindrome() {
            let num = document.getElementById("pal").value;

            if (num === "") {
                document.getElementById("result").innerText = "Please enter a number";
                return;
            }

            let original = num;
            let reversed = num.split("").reverse().join("");

            if (original === reversed) {
                document.getElementById("result").innerText = original + " is a Palindrome number";
            } else {
                document.getElementById("result").innerText = original + " is NOT a Palindrome number";
            }
        }
    </script>

</body>

</html>
