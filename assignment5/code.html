<!DOCTYPE html>
<html>

<head>
    <title>Two Step Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
        }

        .container {
            width: 300px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #studentForm {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Login Form -->
        <div id="loginForm">
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="login()">Submit</button>
        </div>

        <!-- Student Form -->
        <div id="studentForm">
            <h3>Student Form</h3>

            <input type="text" placeholder="Student Name">

            <input type="number" placeholder="Age">

            <!-- Gender -->
            <label>Gender:</label>
            <br>
            Male <input type="radio" name="gender">
            Female<input type="radio" name="gender">

            <input type="text" placeholder="Phone Number">

            <input type="email" placeholder="Email">

            <!-- Photo -->
            <label>Upload Photo:</label>
            <input type="file">

            <!-- Checkbox -->
            <label>Skills:</label><br>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript

            <!-- Branch -->
            <select>
                <option>Select Branch</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
            </select>

            <button onclick="submitForm()">Final Submit</button>
        </div>

    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin" && pass === "1234") {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("studentForm").style.display = "block";
            } else {
                alert("Invalid Login!");
            }
        }

        function submitForm() {
            // Get values
            let name = document.querySelector("input[placeholder='Student Name']").value;
            let age = document.querySelector("input[placeholder='Age']").value;
            let phone = document.querySelector("input[placeholder='Phone Number']").value;
            let email = document.querySelector("input[placeholder='Email']").value;

            let gender = document.querySelector("input[name='gender']:checked")?.nextSibling.textContent.trim();

            let branch = document.querySelector("select").value;

            // Skills
            let skills = [];
            document.querySelectorAll("input[type='checkbox']:checked").forEach(cb => {
                skills.push(cb.nextSibling.textContent.trim());
            });

            // Save in localStorage
            let studentData = {
                name, age, phone, email, gender, branch, skills
            };

            localStorage.setItem("student", JSON.stringify(studentData));

            alert("Form Saved Successfully!");

            // Show data
            displayData();
        }

        function displayData() {
            let data = JSON.parse(localStorage.getItem("student"));

            if (data) {
                alert(
                    "Name: " + data.name + "\n" +
                    "Age: " + data.age + "\n" +
                    "Gender: " + data.gender + "\n" +
                    "Phone: " + data.phone + "\n" +
                    "Email: " + data.email + "\n" +
                    "Branch: " + data.branch + "\n" +
                    "Skills: " + data.skills.join(", ")
                );
            } else {
                alert("No Data Found!");
            }
        }
    </script>

</body>

</html>
