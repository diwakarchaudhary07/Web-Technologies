<!DOCTYPE html>
<html>

<head>
    <title>Rowspan Example</title>
</head>

<body>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td rowspan="2">Aman</td>
            <td>Math: 80</td>
        </tr>
        <tr>
            <td>Science: 85</td>
        </tr>
    </table>

</body>

</html>
