<!DOCTYPE html>
<html>

<body>

    <h3>Greatest Among Three Numbers</h3>

    <input type="number" id="a" placeholder="First number">
    <input type="number" id="b" placeholder="Second number">
    <input type="number" id="c" placeholder="Third number">

    <button onclick="findGreatest()">Find</button>

    <p id="result1"></p>

    <script>
        function findGreatest() {
            let a = parseFloat(document.getElementById("a").value);
            let b = parseFloat(document.getElementById("b").value);
            let c = parseFloat(document.getElementById("c").value);

            let greatest;

            if (a >= b && a >= c) {
                greatest = a;
            } else if (b >= a && b >= c) {
                greatest = b;
            } else {
                greatest = c;
            }

            document.getElementById("result1").innerText = "Greatest: " + greatest;
        }
    </script>

</body>

</html>
